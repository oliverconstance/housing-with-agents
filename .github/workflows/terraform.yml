name: 'Terraform CI/CD'

# The `on` block defines the triggers for this workflow.
on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'frontend/**'
      - 'backend/**'
  pull_request:
    paths:
      - 'terraform/**'
      - 'frontend/**'
      - 'backend/**'

# Required for Workload Identity Federation
permissions:
  contents: 'read'
  id-token: 'write'
  pull-requests: 'write'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/prod

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Authenticate with Google Cloud using Workload Identity Federation (WIF)
    # This securely swaps a short-lived GitHub token for GCP access without permanent keys.
    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
        service_account: '${{ secrets.TF_SERVICE_ACCOUNT_EMAIL }}'

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      id: init
      run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

    - name: Terraform Format
      id: fmt
      run: terraform fmt -check

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -var="domain_name=${{ secrets.DOMAIN_NAME }}"
      continue-on-error: true

    - name: Update Pull Request
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          
          <details><summary>Show Plan</summary>
          
          \`\`\`\n
          ${process.env.PLAN}
          \`\`\`
          
          </details>`;
            
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -var="project_id=${{ secrets.GCP_PROJECT_ID }}" -var="domain_name=${{ secrets.DOMAIN_NAME }}"

  deploy-frontend:
    name: 'Deploy Frontend to Firebase'
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
        service_account: '${{ secrets.TF_SERVICE_ACCOUNT_EMAIL }}'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci

    - name: Build Frontend
      run: npm run build

    - name: Deploy to Firebase Hosting
      run: npx firebase-tools deploy --project ${{ secrets.GCP_PROJECT_ID }} --only hosting

